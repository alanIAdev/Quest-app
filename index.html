<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="Quest"/>
<meta name="theme-color" content="#0f0f1a"/>
<link rel="manifest" id="pwa-manifest"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Quest"/>
<link rel="apple-touch-icon" id="pwa-icon"/>
<title>Quest</title>
<style>
/* ── RESET & BASE ─────────────────────────────────────────── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0f0f1a;
  color:#e8e8f0;
  max-width:430px;margin:0 auto;
  display:flex;flex-direction:column;height:100%;
}
input,select,button{font-family:inherit}
input,select{outline:none;-webkit-appearance:none}
button{cursor:pointer}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ffffff18;border-radius:4px}
select option{background:#1e1e35;color:#e8e8f0}
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.4)}

/* ── PALETTE ──────────────────────────────────────────────── */
/* Primary: violet-blue #7c6aff  Accent: cyan #00d4ff  Hot: #ff6b9d  XP: #ffd166 */

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── LAYOUT ──────────────────────────────────────────────── */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:76px}
.page{padding:16px 16px 0;animation:slideIn .18s ease}

/* ── BOTTOM NAV ──────────────────────────────────────────── */
nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(15,15,26,.96);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid rgba(124,106,255,.15);
  display:flex;justify-content:space-around;
  padding:8px 0 max(8px,env(safe-area-inset-bottom));
  z-index:100;
}
.nav-btn{
  background:transparent;border:none;
  color:rgba(255,255,255,.28);
  display:flex;flex-direction:column;align-items:center;
  padding:4px 10px;border-radius:12px;
  font-size:9px;letter-spacing:.3px;gap:3px;flex:1;
  transition:color .2s;
}
.nav-btn .ni{font-size:20px;line-height:1;transition:transform .2s}
.nav-btn.active{color:#fff}
.nav-btn.active .ni{transform:scale(1.15)}
.nav-btn.active .nav-dot{display:block}
.nav-dot{display:none;width:4px;height:4px;border-radius:50%;background:#7c6aff;margin:-2px auto 0}

/* ── HEADER ──────────────────────────────────────────────── */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-top:4px}
.logo{
  font-size:22px;font-weight:800;letter-spacing:.5px;
  background:linear-gradient(135deg,#7c6aff,#00d4ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.section-title{font-size:18px;font-weight:700;color:#fff}
.date-badge{
  font-size:11px;color:rgba(255,255,255,.4);
  background:rgba(255,255,255,.06);
  padding:4px 10px;border-radius:20px;
}

/* ── CARDS ───────────────────────────────────────────────── */
.card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:14px;margin-bottom:12px;
}
.card-title{
  font-size:10px;font-weight:600;letter-spacing:1.5px;
  color:rgba(255,255,255,.35);text-transform:uppercase;
  margin-bottom:12px;
}

/* ── STAT PILLS ──────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:10px 4px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.stat-val{font-size:17px;font-weight:700;color:#fff}
.stat-lbl{font-size:8px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.5px}

/* ── CHARTS ──────────────────────────────────────────────── */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.chart-box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px;padding:12px 6px;
  display:flex;flex-direction:column;align-items:center;
}
.chart-title{font-size:9px;font-weight:600;letter-spacing:1.5px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:8px;text-align:center}

/* ── LEVEL BARS ──────────────────────────────────────────── */
.level-row{margin-bottom:11px}
.level-header{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;align-items:center}
.level-name{font-weight:600;color:#e8e8f0}
.level-info{font-size:10px;color:rgba(255,255,255,.35)}
.level-track{background:rgba(255,255,255,.07);border-radius:6px;height:6px;overflow:hidden}
.level-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── TASK CARDS ──────────────────────────────────────────── */
.task-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:12px 14px;margin-bottom:8px;
  transition:opacity .2s;
}
.task-card.done-card{opacity:.4}

.check-btn{
  width:32px;height:32px;border-radius:50%;border:2px solid rgba(124,106,255,.6);
  background:transparent;color:rgba(124,106,255,.8);
  font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.check-btn:active{transform:scale(.9)}
.check-btn.done{background:rgba(124,106,255,.2);border-color:rgba(124,106,255,.3);color:rgba(124,106,255,.5)}
.task-title{font-size:14px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-meta{font-size:10px;color:rgba(255,255,255,.35);margin-top:3px;display:flex;align-items:center;gap:6px}
.task-cat-pill{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:20px;font-size:9px;font-weight:600;
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.45);
}
.streak-badge{color:#ff9500;font-size:10px}
.edit-btn{background:transparent;border:none;color:rgba(255,255,255,.25);font-size:15px;padding:4px 5px;line-height:1}
.delete-btn{background:transparent;border:none;color:rgba(255,255,255,.18);font-size:14px;padding:4px 5px;line-height:1}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn-primary{
  background:linear-gradient(135deg,#7c6aff,#5a4fcf);
  color:#fff;border:none;border-radius:12px;
  padding:10px 18px;font-size:13px;font-weight:600;
  box-shadow:0 4px 16px rgba(124,106,255,.35);
  transition:transform .12s,box-shadow .12s;
}
.btn-primary:active{transform:scale(.97);box-shadow:0 2px 8px rgba(124,106,255,.25)}
.btn-ghost{
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.1);border-radius:12px;
  padding:10px 18px;font-size:13px;font-weight:500;
}
.btn-danger{
  background:rgba(255,77,77,.1);color:#ff6b6b;
  border:1px solid rgba(255,77,77,.2);border-radius:12px;
  padding:10px 18px;font-size:13px;font-weight:500;
}

/* ── FILTERS ─────────────────────────────────────────────── */
.filter-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px}
.filter-row::-webkit-scrollbar{height:0}
.filter-btn{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.45);
  border-radius:20px;padding:5px 14px;font-size:11px;font-weight:500;
  white-space:nowrap;transition:all .15s;
}
.filter-btn.active{
  background:linear-gradient(135deg,#7c6aff,#5a4fcf);
  color:#fff;border-color:transparent;
  box-shadow:0 2px 10px rgba(124,106,255,.35);
}

/* ── TOAST ───────────────────────────────────────────────── */
#toast{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);
  background:rgba(30,30,53,.95);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(124,106,255,.3);
  color:#e8e8f0;padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:500;
  z-index:999;display:none;align-items:center;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:fadeUp .22s ease;white-space:nowrap;gap:6px;
}
.xp-badge{
  background:linear-gradient(135deg,#ffd166,#ffb300);
  color:#000;padding:2px 8px;border-radius:20px;
  font-size:11px;font-weight:700;
}

/* ── OVERLAY / MODAL ─────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  padding:0;
}
.modal-box{
  background:#1a1a2e;
  border:1px solid rgba(124,106,255,.25);
  border-radius:24px 24px 0 0;
  padding:24px 20px 32px;
  width:100%;max-width:430px;
  box-shadow:0 -16px 48px rgba(0,0,0,.5);
  animation:popIn .22s ease;
  max-height:90vh;overflow-y:auto;
}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:18px;text-align:center}
.form-label{font-size:10px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,.35);text-transform:uppercase;display:block;margin-bottom:8px;margin-top:14px}
.form-input{
  width:100%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  color:#fff;border-radius:12px;
  padding:12px 14px;font-size:14px;
  margin-bottom:4px;
}
.form-input:focus{border-color:rgba(124,106,255,.5);background:rgba(124,106,255,.08)}
.form-select{
  width:100%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  color:#fff;border-radius:12px;
  padding:12px 14px;font-size:14px;
}

/* ── ICON GRID ───────────────────────────────────────────── */
.icon-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.icon-btn{
  font-size:22px;
  background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.08);
  border-radius:10px;padding:6px 8px;
  transition:all .12s;
}
.icon-btn.active{border-color:#7c6aff;background:rgba(124,106,255,.15);transform:scale(1.1)}

/* ── FREQ CHIPS ──────────────────────────────────────────── */
.freq-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.freq-btn{
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.5);
  border-radius:20px;padding:6px 14px;font-size:11px;font-weight:500;
  white-space:nowrap;transition:all .12s;
}
.freq-btn.active{
  background:linear-gradient(135deg,#7c6aff,#5a4fcf);
  color:#fff;border-color:transparent;
  box-shadow:0 2px 10px rgba(124,106,255,.35);
}

/* ── DAY BUTTONS ─────────────────────────────────────────── */
.day-wrap{display:flex;gap:5px;margin-bottom:6px}
.day-btn{
  flex:1;
  background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.4);
  border-radius:10px;padding:8px 2px;
  font-size:10px;font-weight:500;text-align:center;
  transition:all .12s;
}
.day-btn.active{background:rgba(0,212,255,.15);border-color:#00d4ff;color:#00d4ff}

/* ── FREQ HINT ───────────────────────────────────────────── */
.freq-hint{
  font-size:10px;color:rgba(255,255,255,.35);
  margin-bottom:4px;line-height:1.5;
  padding:8px 12px;
  background:rgba(124,106,255,.08);
  border-radius:10px;
  border:1px solid rgba(124,106,255,.12);
}

/* ── BONUS BADGE ─────────────────────────────────────────── */
.bonus-badge{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;flex-shrink:0;
}

/* ── BONUS POPUP ─────────────────────────────────────────── */
#bonus-popup{
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:300;display:none;align-items:center;justify-content:center;padding:24px;
}
.bonus-inner{
  background:linear-gradient(160deg,#1e1e35,#16162a);
  border:1.5px solid rgba(124,106,255,.4);
  border-radius:24px;padding:36px 28px;
  width:100%;max-width:320px;
  display:flex;flex-direction:column;align-items:center;
  box-shadow:0 24px 64px rgba(124,106,255,.2);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
  text-align:center;
}
.bonus-star{
  font-size:52px;margin-bottom:12px;
  display:inline-block;animation:spin 4s linear infinite;
  filter:drop-shadow(0 0 16px #7c6aff);
}
.bonus-tag{
  font-size:9px;font-weight:700;letter-spacing:2px;
  color:rgba(124,106,255,.7);text-transform:uppercase;margin-bottom:6px;
}
.bonus-title{
  font-size:26px;font-weight:800;
  background:linear-gradient(135deg,#7c6aff,#00d4ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:18px;
}
.bonus-divider{width:50px;height:2px;background:linear-gradient(90deg,#7c6aff,#00d4ff);border-radius:1px;margin-bottom:16px}
.bonus-xp{
  font-size:28px;font-weight:800;
  background:linear-gradient(135deg,#ffd166,#ff9500);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:24px;
}

/* ── CAT ROW ─────────────────────────────────────────────── */
.cat-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}

/* ── HISTORY TABLE ───────────────────────────────────────── */
.hist-scroll{overflow-x:auto;margin-bottom:12px;border-radius:12px}
.hist-scroll::-webkit-scrollbar{height:3px}
.hist-table{border-collapse:collapse;min-width:100%;font-size:10px}
.hist-table th{
  background:#16162a;color:rgba(255,255,255,.35);
  font-size:8px;font-weight:600;letter-spacing:.5px;
  padding:8px 9px;white-space:nowrap;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.hist-table th:first-child{position:sticky;left:0;background:#16162a;z-index:2;text-align:left;min-width:110px}
.hist-table td{
  padding:8px 9px;border-bottom:1px solid rgba(255,255,255,.04);
  white-space:nowrap;text-align:center;vertical-align:middle;
}
.hist-table td:first-child{
  position:sticky;left:0;background:#111126;
  text-align:left;color:rgba(255,255,255,.7);font-size:10px;
  max-width:110px;overflow:hidden;text-overflow:ellipsis;
}
.hist-table tr:hover td{background:rgba(255,255,255,.02)}
.hist-cell-done{color:#7c6aff;font-size:14px}
.hist-cell-miss{color:rgba(255,255,255,.1);font-size:11px}
.hist-cell-na{color:rgba(255,255,255,.06);font-size:10px}
.hist-th-today{color:#00d4ff !important;border-bottom:2px solid #00d4ff !important}
.hist-td-today{background:rgba(0,212,255,.04) !important}
.hist-cat-row td{
  background:#111126 !important;
  color:rgba(255,255,255,.4) !important;
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  border-top:1px solid rgba(255,255,255,.05);
  padding:6px 9px;text-align:left;
}

/* ── SETTINGS TIME INPUT ─────────────────────────────────── */
.time-input{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  color:#fff;border-radius:12px;
  padding:12px 14px;font-size:14px;
  flex:1;
}
</style>
</head>

<body>
<div style="display:flex;flex-direction:column;height:100%">
  <div id="content"></div>
  <nav>
    <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">
      <span class="ni">⬡</span><span>Tableau</span><span class="nav-dot"></span>
    </button>
    <button class="nav-btn" data-tab="tasks" onclick="switchTab('tasks')">
      <span class="ni">✦</span><span>Tâches</span><span class="nav-dot"></span>
    </button>
    <button class="nav-btn" data-tab="history" onclick="switchTab('history')">
      <span class="ni">◫</span><span>Historique</span><span class="nav-dot"></span>
    </button>
    <button class="nav-btn" data-tab="bonus" onclick="switchTab('bonus')">
      <span class="ni">◉</span><span>Bonus</span><span class="nav-dot"></span>
    </button>
    <button class="nav-btn" data-tab="settings" onclick="switchTab('settings')">
      <span class="ni">⊕</span><span>Réglages</span><span class="nav-dot"></span>
    </button>
  </nav>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- BONUS POPUP -->
<div id="bonus-popup" style="display:none">
  <div class="bonus-inner">
    <div class="bonus-star">✦</div>
    <p class="bonus-tag">Mission Bonus</p>
    <p class="bonus-title">Accomplie !</p>
    <div class="bonus-divider"></div>
    <p id="bp-desc" style="font-size:13px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:14px;padding:0 6px"></p>
    <p class="bonus-xp">+100 XP</p>
    <button class="btn-primary" style="width:100%;padding:13px" onclick="closeBonusPopup()">Continuer →</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal" style="display:none" class="overlay" onclick="handleOverlayClick(event)">
  <div class="modal-box" id="modal-inner"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════
const DEFAULT_CATS=[
  {id:'cat_sport', name:'Sport',            icon:'🏋️',xp:0,color:'#ff6b9d'},
  {id:'cat_wisdom',name:'Wisdom',           icon:'📚',xp:0,color:'#7c6aff'},
  {id:'cat_health',name:'Health',           icon:'🍎',xp:0,color:'#06d6a0'},
  {id:'cat_rel',   name:'Relationship',     icon:'❤️',xp:0,color:'#ff6b9d'},
  {id:'cat_work',  name:'Work',             icon:'💼',xp:0,color:'#ffd166'},
  {id:'cat_self',  name:'Self Improvement', icon:'🌱',xp:0,color:'#06d6a0'},
  {id:'cat_rev',   name:'Revenues',         icon:'💰',xp:0,color:'#ffd166'},
];

// Gradient per category index for visual variety
const CAT_GRADIENTS=[
  'linear-gradient(135deg,#ff6b9d,#c44dff)',
  'linear-gradient(135deg,#7c6aff,#00d4ff)',
  'linear-gradient(135deg,#06d6a0,#00b4d8)',
  'linear-gradient(135deg,#ffd166,#ff9500)',
  'linear-gradient(135deg,#ff6b9d,#ff9500)',
  'linear-gradient(135deg,#7c6aff,#06d6a0)',
  'linear-gradient(135deg,#00d4ff,#7c6aff)',
];

const FREQS=[
  {id:'daily', label:'1×/jour'},
  {id:'twice', label:'2×/jour'},
  {id:'3week', label:'3×/semaine'},
  {id:'4week', label:'4×/semaine'},
  {id:'2week', label:'2×/semaine'},
  {id:'weekly',label:'1×/semaine'},
  {id:'once',  label:'Ponctuel'},
];
const DAY_NAMES=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const BONUS_XP=100,TASK_XP=50;

function uid(){return Math.random().toString(36).slice(2,9)}
function today(){return new Date().toISOString().slice(0,10)}
function load(k,def){try{const v=JSON.parse(localStorage.getItem(k));return v!==null?v:def}catch{return def}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}

let cats,tasks,bonus,notifTime,currentTab;

// ══════════════════════════════════════════════════════
// FREQUENCY HELPERS
// ══════════════════════════════════════════════════════
function freqLabel(id){return FREQS.find(f=>f.id===id)?.label||id}

function getWeekStart(){
  const d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  return new Date(new Date().setDate(diff)).toISOString().slice(0,10);
}

function isTaskDueToday(t){
  if(t.freq==='once') return !t.doneOnce;
  if(t.freq==='daily'||t.freq==='twice') return true;
  if(['2week','3week','4week'].includes(t.freq)) return true;
  if(t.freq==='weekly'){
    const dow=new Date().getDay(),chosen=(t.weekDays||[])[0];
    if(chosen===dow) return true;
    const ws=getWeekStart();
    return !(t.completionLog||[]).some(d=>d>=ws&&d<=today());
  }
  return true;
}

function isTaskDueOnDate(t,ds){
  const dow=new Date(ds+'T12:00:00').getDay();
  if(t.freq==='once') return true;
  if(t.freq==='daily'||t.freq==='twice') return true;
  if(['2week','3week','4week'].includes(t.freq)) return (t.weekDays||[]).includes(dow);
  if(t.freq==='weekly') return (t.weekDays||[])[0]===dow;
  return true;
}

function maxComp(freq){return freq==='twice'?2:1}
function compOnDate(t,ds){return(t.completionLog||[]).filter(d=>d===ds).length}
function compToday(t){return compOnDate(t,today())}

function canComplete(t){
  if(t.freq==='once') return !t.doneOnce;
  if(!isTaskDueToday(t)) return false;
  if(['2week','3week','4week'].includes(t.freq)){
    const quota={'2week':2,'3week':3,'4week':4}[t.freq];
    const ws=getWeekStart();
    return (t.completionLog||[]).filter(d=>d>=ws&&d<=today()).length<quota;
  }
  return compToday(t)<maxComp(t.freq);
}

function weeklyDoneCount(t){
  const ws=getWeekStart();
  return(t.completionLog||[]).filter(d=>d>=ws&&d<=today()).length;
}

// ══════════════════════════════════════════════════════
// LEVELS
// ══════════════════════════════════════════════════════
function levelThreshold(l){return l*200}
function calcLevel(xp){
  let lvl=1,rem=xp||0;
  while(rem>=levelThreshold(lvl)){rem-=levelThreshold(lvl);lvl++;}
  return{level:lvl,cur:rem,next:levelThreshold(lvl)};
}

// ══════════════════════════════════════════════════════
// BONUS MISSIONS
// ══════════════════════════════════════════════════════
const BONUS_POOL=[
  {key:'b_3cat',    desc:'Complète 3 tâches dans une même catégorie',        check:t=>Object.values(t.reduce((a,x)=>{if(compToday(x)>0)a[x.catId]=(a[x.catId]||0)+compToday(x);return a},{})).some(v=>v>=3)},
  {key:'b_all',     desc:"Termine toutes les tâches prévues aujourd'hui",    check:t=>t.filter(isTaskDueToday).length>0&&t.filter(isTaskDueToday).every(x=>!canComplete(x))},
  {key:'b_5total',  desc:"Accomplis 5 tâches au total aujourd'hui",          check:t=>t.reduce((s,x)=>s+compToday(x),0)>=5},
  {key:'b_everycat',desc:'Une tâche accomplie dans chaque catégorie',        check:(t,c)=>c.every(cat=>t.some(x=>x.catId===cat.id&&compToday(x)>0))},
  {key:'b_streak3', desc:'Avoir 3 tâches avec un streak de 2 jours ou plus',check:t=>t.filter(x=>(x.streak||0)>=2).length>=3},
  {key:'b_2cat2',   desc:'2 tâches complétées dans 2 catégories différentes',check:t=>Object.values(t.reduce((a,x)=>{if(compToday(x)>0)a[x.catId]=(a[x.catId]||0)+compToday(x);return a},{})).filter(v=>v>=2).length>=2},
];

function genBonus(){
  return[...BONUS_POOL].sort(()=>Math.random()-.5).slice(0,3).map(b=>({id:uid(),key:b.key,desc:b.desc,done:false}));
}
function checkBonuses(){
  const map=Object.fromEntries(BONUS_POOL.map(b=>[b.key,b.check]));
  let changed=false;
  bonus=bonus.map(b=>{
    if(b.done) return b;
    const fn=map[b.key];
    if(fn&&fn(tasks,cats)){changed=true;showBonusPopup(b);if(cats[0])grantXP(cats[0].id,BONUS_XP);return{...b,done:true};}
    return b;
  });
  if(changed){save('qst_bonus',bonus);render();}
}

// ══════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════
function grantXP(catId,amount){
  cats=cats.map(c=>c.id===catId?{...c,xp:(c.xp||0)+amount}:c);
  save('qst_cats',cats);
}
function completeTask(id){
  tasks=tasks.map(t=>{
    if(t.id!==id||!canComplete(t)) return t;
    const log=[...(t.completionLog||[]),today()];
    const streak=t.lastDone===today()?(t.streak||0):(t.streak||0)+1;
    return{...t,completionLog:log,lastDone:today(),streak,doneOnce:t.freq==='once'?true:t.doneOnce};
  });
  const t=tasks.find(x=>x.id===id);
  if(t) grantXP(t.catId,TASK_XP);
  save('qst_tasks',tasks);
  showToast('Tâche accomplie !',TASK_XP);
  setTimeout(checkBonuses,100);
  render();
}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);save('qst_tasks',tasks);showToast('Supprimée');render();}
function deleteCat(id){cats=cats.filter(c=>c.id!==id);save('qst_cats',cats);showToast('Catégorie supprimée');render();}

let toastTimer;
function showToast(msg,xp=0){
  const el=document.getElementById('toast');
  el.innerHTML=msg+(xp>0?`<span class="xp-badge">+${xp} XP</span>`:'');
  el.style.display='flex';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.style.display='none',2300);
}

let bonusQueue=[],bonusShowing=false;
function showBonusPopup(b){bonusQueue.push(b);if(!bonusShowing)nextBonusPopup();}
function nextBonusPopup(){
  if(!bonusQueue.length){bonusShowing=false;return;}
  bonusShowing=true;
  const b=bonusQueue.shift();
  document.getElementById('bp-desc').textContent=b.desc;
  document.getElementById('bonus-popup').style.display='flex';
}
function closeBonusPopup(){document.getElementById('bonus-popup').style.display='none';setTimeout(nextBonusPopup,200);}

// ══════════════════════════════════════════════════════
// RADAR SVG (updated colors)
// ══════════════════════════════════════════════════════
function radarSVG(items,accent){
  const n=items.length;
  if(n<3) return '<div style="color:rgba(255,255,255,.2);font-size:10px;text-align:center;padding:20px">3+ catégories</div>';
  const cx=95,cy=95,r=65;
  const a=i=>(Math.PI*2*i)/n-Math.PI/2;
  const pt=(i,v)=>({x:cx+r*v*Math.cos(a(i)),y:cy+r*v*Math.sin(a(i))});
  const col=accent||'#7c6aff';
  let s=`<svg width="190" height="190" style="overflow:visible">`;
  [.25,.5,.75,1].forEach(lv=>{
    s+=`<polygon points="${items.map((_,i)=>{const p=pt(i,lv);return p.x+','+p.y;}).join(' ')}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;
  });
  items.forEach((_,i)=>{const p=pt(i,1);s+=`<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;});
  const pts=items.map((c,i)=>{const p=pt(i,Math.min(c.value||0,1));return p.x+','+p.y;}).join(' ');
  s+=`<defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c6aff" stop-opacity=".25"/><stop offset="100%" stop-color="#00d4ff" stop-opacity=".25"/></linearGradient></defs>`;
  s+=`<polygon points="${pts}" fill="url(#rg)" stroke="${col}" stroke-width="1.5"/>`;
  items.forEach((c,i)=>{const p=pt(i,Math.min(c.value||0,1));s+=`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="${col}"/>`;});
  items.forEach((c,i)=>{const p=pt(i,1.3);s+=`<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="rgba(255,255,255,.5)" font-family="-apple-system,sans-serif">${c.name.slice(0,7)}</text>`;});
  s+='</svg>';
  return s;
}

      <span class="level-info">LVL ${level} · ${cur}/${next} XP</span>
    </div>
    <div class="level-track">
      <div class="level-fill" style="width:${pct}%;background:${grad}"></div>
    </div>
  </div>`;
}

let taskFilter='today';
function setFilter(f){taskFilter=f;render();}

function taskCheckLabel(t){
  if(!canComplete(t)) return '✓';
  if(t.freq==='twice'){const c=compToday(t);return`${c}/2`;}
  if(['2week','3week','4week'].includes(t.freq)){
    const quota={'2week':2,'3week':3,'4week':4}[t.freq];
    const done=weeklyDoneCount(t);
    return done>0?`${done}/${quota}`:'○';
  }
  return '○';
}

function taskCardHTML(t){
  const cat=cats.find(c=>c.id===t.catId);
  const catIdx=cats.findIndex(c=>c.id===t.catId);
  const done=!canComplete(t);
  const lbl=taskCheckLabel(t);
  const grad=CAT_GRADIENTS[catIdx%CAT_GRADIENTS.length];
  return`<div class="task-card${done?' done-card':''}">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="check-btn${done?' done':''}" onclick="completeTask('${t.id}')" ${done?'disabled':''}
        style="${done?'':'border-color:rgba(124,106,255,.5);color:#7c6aff'}">${lbl}</button>
      <div style="flex:1;min-width:0">
        <div class="task-title">${escH(t.title)}</div>
        <div class="task-meta">
          <span style="color:rgba(255,255,255,.25)">${freqLabel(t.freq)}</span>
          ${(t.streak||0)>0?`<span class="streak-badge">🔥${t.streak}</span>`:''}
        </div>
      </div>
      <button class="edit-btn" onclick="openEditTask('${t.id}')">✎</button>
      <button class="delete-btn" onclick="deleteTask('${t.id}')">✕</button>
    </div>
  </div>`;
}

function catHeaderHTML(cat,idx,count){
  const grad=CAT_GRADIENTS[idx%CAT_GRADIENTS.length];
  return`<div style="display:flex;align-items:center;gap:10px;margin:18px 0 8px;${idx===0?'margin-top:4px':''}">
    <div style="width:32px;height:32px;border-radius:10px;background:${grad};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${cat.icon}</div>
    <div style="flex:1">
      <span style="font-size:14px;font-weight:700;color:#fff">${escH(cat.name)}</span>
      <span style="font-size:10px;color:rgba(255,255,255,.3);margin-left:8px">${count} tâche${count>1?'s':''}</span>
    </div>
    <div style="height:1px;flex:1;background:rgba(255,255,255,.06)"></div>
  </div>`;
}

function renderTasks(){
  const grouped = taskFilter==='today' || taskFilter==='all';
  const baseList = taskFilter==='today' ? tasks.filter(isTaskDueToday)
                 : taskFilter==='all'   ? tasks
                 : tasks.filter(t=>t.catId===taskFilter);

  const filterBtns=[
    {id:'today',label:"Aujourd'hui"},{id:'all',label:'Toutes'},
    ...cats.map(c=>({id:c.id,label:c.icon+' '+c.name.slice(0,8)}))
  ].map(f=>`<button class="filter-btn${taskFilter===f.id?' active':''}" onclick="setFilter('${f.id}')">${f.label}</button>`).join('');

  let content='';
  if(!baseList.length){
    content='<div style="color:rgba(255,255,255,.2);text-align:center;padding:48px;font-size:13px">Aucune tâche pour ce filtre</div>';
  } else if(grouped){
    // Group by category, show header per category
    cats.forEach((cat,idx)=>{
      const catTasks=baseList.filter(t=>t.catId===cat.id);
      if(!catTasks.length) return;
      content+=catHeaderHTML(cat,idx,catTasks.length);
      content+=catTasks.map(taskCardHTML).join('');
    });
    // Tasks with unknown category
    const unknownTasks=baseList.filter(t=>!cats.find(c=>c.id===t.catId));
    if(unknownTasks.length){
      content+=`<div style="font-size:11px;font-weight:600;color:rgba(255,255,255,.25);letter-spacing:1px;text-transform:uppercase;margin:16px 0 8px">Sans catégorie</div>`;
      content+=unknownTasks.map(taskCardHTML).join('');
    }
  } else {
    // Single-category filter: no header needed, show cat pill on each card
    content=baseList.map(t=>{
      const cat=cats.find(c=>c.id===t.catId);
      const catIdx=cats.findIndex(c=>c.id===t.catId);
      const done=!canComplete(t);
      const lbl=taskCheckLabel(t);
      const grad=CAT_GRADIENTS[catIdx%CAT_GRADIENTS.length];
      return`<div class="task-card${done?' done-card':''}">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="check-btn${done?' done':''}" onclick="completeTask('${t.id}')" ${done?'disabled':''}
            style="${done?'':'border-color:rgba(124,106,255,.5);color:#7c6aff'}">${lbl}</button>
          <div style="flex:1;min-width:0">
            <div class="task-title">${escH(t.title)}</div>
            <div class="task-meta">
              <span class="task-cat-pill">${cat?cat.icon+' '+cat.name:'?'}</span>
              <span style="color:rgba(255,255,255,.25)">${freqLabel(t.freq)}</span>
              ${(t.streak||0)>0?`<span class="streak-badge">🔥${t.streak}</span>`:''}
            </div>
          </div>
          <button class="edit-btn" onclick="openEditTask('${t.id}')">✎</button>
          <button class="delete-btn" onclick="deleteTask('${t.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  return`<div class="page">
    <div class="header">
      <span class="section-title">Tâches</span>
      <button class="btn-primary" onclick="openModal('task')" style="padding:8px 16px;font-size:12px">+ Ajouter</button>
    </div>
    <div class="filter-row">${filterBtns}</div>
    ${content}
  </div>`;
}

// ══════════════════════════════════════════════════════
// HISTORY
// ══════════════════════════════════════════════════════
let histDays=14;
function setHistDays(n){histDays=n;render();}

function getDateRange(n){
  const dates=[];
  for(let i=n-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().slice(0,10));}
  return dates;
}
function shortDate(s){const d=new Date(s+'T12:00:00');return d.getDate()+'/'+(d.getMonth()+1);}

function renderHistory(){
  const dates=getDateRange(histDays);
  const todayStr=today();
  const allLogDates=new Set();
  tasks.forEach(t=>(t.completionLog||[]).forEach(d=>allLogDates.add(d)));
  const extraDates=[...allLogDates].filter(d=>d<dates[0]).sort();
  const allDates=[...extraDates,...dates];

  let headCols=`<th style="position:sticky;left:0;background:#16162a;z-index:2;text-align:left;min-width:110px">TÂCHE</th>`;
  allDates.forEach(d=>{
    const isT=d===todayStr;
    headCols+=`<th class="${isT?'hist-th-today':''}" style="min-width:34px;${isT?'background:rgba(0,212,255,.05);':''}">${shortDate(d)}</th>`;
  });

  let tableBody='';
  cats.forEach(cat=>{
    const catTasks=tasks.filter(t=>t.catId===cat.id);
    if(!catTasks.length) return;
    tableBody+=`<tr class="hist-cat-row"><td colspan="${allDates.length+1}">${cat.icon} ${escH(cat.name)}</td></tr>`;
    catTasks.forEach(t=>{
      let row=`<td title="${escH(t.title)}">${escH(t.title.slice(0,14)+(t.title.length>14?'…':''))}</td>`;
      allDates.forEach(d=>{
        const isT=d===todayStr;
        const due=isTaskDueOnDate(t,d);
        const cnt=compOnDate(t,d);
        const mx=maxComp(t.freq);
        const bg=isT?'background:rgba(0,212,255,.04);':'';
        let cell;
        if(!due) cell=`<td class="hist-cell-na" style="${bg}">·</td>`;
        else if(cnt>=mx) cell=`<td class="hist-cell-done" style="${bg}">✓</td>`;
        else if(cnt>0) cell=`<td style="color:rgba(124,106,255,.6);font-size:10px;${bg}">½</td>`;
        else cell=`<td class="hist-cell-miss" style="${bg}">○</td>`;
        row+=cell;
      });
      tableBody+=`<tr>${row}</tr>`;
    });
  });

  let xpRow=`<td style="position:sticky;left:0;background:#111126;color:rgba(255,255,255,.3);font-size:9px;font-weight:600;letter-spacing:.5px;padding:8px 9px;text-transform:uppercase">XP Jour</td>`;
  allDates.forEach(d=>{
    const isT=d===todayStr;
    const xp=tasks.reduce((s,t)=>s+compOnDate(t,d)*TASK_XP,0);
    xpRow+=`<td style="color:${xp>0?'#ffd166':'rgba(255,255,255,.1)'};font-size:9px;font-weight:700;${isT?'background:rgba(0,212,255,.04);':''}">${xp||'—'}</td>`;
  });

  const dayBtns=[7,14,30].map(n=>`<button class="filter-btn${histDays===n?' active':''}" onclick="setHistDays(${n})">${n}j</button>`).join('');
  return`<div class="page">
    <div class="header"><span class="section-title">Historique</span></div>
    <div class="filter-row">${dayBtns}
      <span style="flex:1"></span>
      <span style="font-size:9px;color:rgba(255,255,255,.2);align-self:center">✓ fait &nbsp;○ manqué &nbsp;· hors planning</span>
    </div>
    <div class="hist-scroll">
      <table class="hist-table">
        <thead><tr>${headCols}</tr></thead>
        <tbody>${tableBody}<tr style="border-top:1px solid rgba(255,255,255,.06)">${xpRow}</tr></tbody>
      </table>
    </div>
    ${tasks.length===0?'<div style="color:rgba(255,255,255,.2);text-align:center;padding:40px;font-size:13px">Aucune tâche enregistrée</div>':''}
  </div>`;
}

function scheduleNotif(){
  notifTime=document.getElementById('notif-input')?.value||notifTime;
  localStorage.setItem('qst_notif',notifTime);
  if('Notification' in window){Notification.requestPermission().then(p=>showToast(p==='granted'?`Notif à ${notifTime} ✓`:"Active les notifications d'abord"));}
  else showToast('Heure sauvegardée : '+notifTime);
}

// ══════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════
let modalType='task',editTaskId=null;
let mTitle='',mCatId='',mFreq='daily',mWeekDays=[],mIcon='⚡';

const ICONS=['⚡','💪','📚','🎯','🎨','🏃','🧘','💼','🌱','🎮','🍎','✍️','🔬','🎵','❤️','💰','🧠','🏋️','🤝','📈'];
const DAY_COUNT={'2week':2,'3week':3,'4week':4,'weekly':1};
const NEEDS_DAYS=new Set(['2week','3week','4week','weekly']);

function handleOverlayClick(e){if(e.target.id==='modal')closeModal();}
function openModal(type){
  modalType=type;editTaskId=null;
  mTitle='';mCatId=cats[0]?.id||'';mFreq='daily';mWeekDays=[];mIcon='⚡';
  document.getElementById('modal').style.display='flex';renderModal();
}
function openEditTask(id){
  const t=tasks.find(x=>x.id===id);if(!t) return;
  modalType='edit';editTaskId=id;
  mTitle=t.title;mCatId=t.catId;mFreq=t.freq;mWeekDays=[...(t.weekDays||[])];mIcon='⚡';
  document.getElementById('modal').style.display='flex';renderModal();
}
function closeModal(){document.getElementById('modal').style.display='none';}

function syncFromDOM(){
  const ti=document.getElementById('m-title'),ci=document.getElementById('m-cat');
  if(ti) mTitle=ti.value;if(ci) mCatId=ci.value;
}
function setMFreq(f){syncFromDOM();mFreq=f;mWeekDays=[];renderModal();}
function setMIcon(i){mIcon=i;renderModal();}
function toggleMDay(d){
  syncFromDOM();
  if(mFreq==='weekly'){mWeekDays=[d];renderModal();return;}
  const mx=DAY_COUNT[mFreq]||1;
  mWeekDays=mWeekDays.includes(d)?mWeekDays.filter(x=>x!==d):(mWeekDays.length<mx?[...mWeekDays,d]:mWeekDays);
  renderModal();
}

function freqHint(f){
  const hints={
    daily:'Chaque jour, 1 fois par jour.',
    twice:'Chaque jour, 2 fois par jour.',
    '2week':'2 fois par semaine — cochable n\'importe quel jour.',
    '3week':'3 fois par semaine — cochable n\'importe quel jour.',
    '4week':'4 fois par semaine — cochable n\'importe quel jour.',
    weekly:'1 fois par semaine — choisir le jour de rappel.',
    once:'Ponctuelle — disparaît après completion.',
  };
  return hints[f]||'';
}

function renderModal(){
  const isEdit=modalType==='edit',isCat=modalType==='cat';
  const needsDays=NEEDS_DAYS.has(mFreq);
  let html=`<div class="modal-handle"></div>`;

  if(isCat){
    html+=`<div class="modal-title">Nouvelle catégorie</div>
    <div class="form-label">Icône</div>
    <div class="icon-grid">${ICONS.map(ic=>`<button class="icon-btn${mIcon===ic?' active':''}" onclick="setMIcon('${ic}')">${ic}</button>`).join('')}</div>
    <div class="form-label">Nom</div>
    <input id="m-name" class="form-input" placeholder="Ex: Lecture, Sport..." autocomplete="off">`;
  } else {
    const freqBtns=FREQS.map(f=>`<button class="freq-btn${mFreq===f.id?' active':''}" onclick="setMFreq('${f.id}')">${f.label}</button>`).join('');
    const hint=freqHint(mFreq);
    const daySection=needsDays?`
      <div class="form-label">${mFreq==='weekly'?'Jour de rappel':'Jours de rappel'} (${mWeekDays.length}/${DAY_COUNT[mFreq]||1})</div>
      <div class="day-wrap">${DAY_NAMES.map((d,i)=>`<button class="day-btn${mWeekDays.includes(i)?' active':''}" onclick="toggleMDay(${i})">${d}</button>`).join('')}</div>`:'';
    const catOpts=cats.map(c=>`<option value="${c.id}"${c.id===mCatId?' selected':''}>${c.icon} ${c.name}</option>`).join('');
    html+=`<div class="modal-title">${isEdit?'Modifier la tâche':'Nouvelle tâche'}</div>
    <div class="form-label">Titre</div>
    <input id="m-title" class="form-input" placeholder="Nom de la tâche..." autocomplete="off" value="${escH(mTitle)}" oninput="mTitle=this.value">
    <div class="form-label">Fréquence</div>
    <div class="freq-wrap">${freqBtns}</div>
    ${hint?`<div class="freq-hint">${hint}</div>`:''}
    ${daySection}
    <div class="form-label">Catégorie</div>
    <select id="m-cat" class="form-select" onchange="mCatId=this.value">${catOpts}</select>`;
  }

  html+=`<div style="display:flex;gap:8px;margin-top:20px">
    <button class="btn-primary" style="flex:1;padding:13px" onclick="submitModal()">${isEdit?'Enregistrer':'Créer'}</button>
    <button class="btn-ghost" style="flex:1;padding:13px" onclick="closeModal()">Annuler</button>
  </div>`;
  if(isEdit){
    html+=`<button class="btn-danger" style="width:100%;padding:12px;margin-top:8px" onclick="confirmDeleteTask('${editTaskId}')">🗑 Supprimer cette tâche</button>`;
  }

  document.getElementById('modal-inner').innerHTML=html;
  if(!isCat){const ti=document.getElementById('m-title');if(ti&&!mTitle)ti.focus();}
}

function confirmDeleteTask(id){
  if(confirm('Supprimer cette tâche définitivement ?')){deleteTask(id);closeModal();}
}

function submitModal(){
  if(modalType==='cat'){
    const name=document.getElementById('m-name')?.value?.trim();
    if(!name){showToast('Entre un nom');return;}
    cats.push({id:uid(),name,icon:mIcon,xp:0,color:'#7c6aff'});
    save('qst_cats',cats);showToast('Catégorie créée !');closeModal();render();return;
  }
  const title=mTitle.trim();
  const catId=mCatId||document.getElementById('m-cat')?.value;
  if(!title){showToast('Entre un titre');return;}
  if(!catId){showToast('Choisis une catégorie');return;}
  if(NEEDS_DAYS.has(mFreq)&&mWeekDays.length!==(DAY_COUNT[mFreq]||1)){
    showToast('Sélectionne '+(DAY_COUNT[mFreq]||1)+' jour(s)');return;
  }
  if(modalType==='edit'&&editTaskId){
    tasks=tasks.map(t=>t.id!==editTaskId?t:{...t,title,freq:mFreq,catId,weekDays:mWeekDays.slice()});
    save('qst_tasks',tasks);showToast('Modifiée !');
  } else {
    tasks.push({id:uid(),title,freq:mFreq,catId,weekDays:mWeekDays.slice(),completionLog:[],streak:0,lastDone:null,doneOnce:false});
    save('qst_tasks',tasks);showToast('Tâche ajoutée !');
  }
  closeModal();render();
}

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ══════════════════════════════════════════════════════
// INIT — after all functions/consts are defined
// ══════════════════════════════════════════════════════
cats=load('qst_cats',null);
if(!cats||!cats.length) cats=DEFAULT_CATS.map(c=>({...c}));
tasks=load('qst_tasks',[]);
notifTime=localStorage.getItem('qst_notif')||'09:00';
currentTab='dashboard';
mCatId=cats[0]?.id||'';

bonus=load('qst_bonus',null);
const _bd=localStorage.getItem('qst_bonus_date');
if(!bonus||_bd!==today()){bonus=genBonus();save('qst_bonus',bonus);localStorage.setItem('qst_bonus_date',today());}
if(localStorage.getItem('qst_reset')!==today()){bonus=genBonus();save('qst_bonus',bonus);localStorage.setItem('qst_reset',today());}

render();

// ══════════════════════════════════════════════════════
// PWA — Manifest + Service Worker (inline, no server needed)
// ══════════════════════════════════════════════════════

// 1. Build SVG icon as data URL
const ICON_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#0f0f1a"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6aff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <polygon points="256,80 340,196 460,196 370,268 404,388 256,316 108,388 142,268 52,196 172,196"
    fill="url(#g1)"/>
</svg>`;
const iconDataURL = 'data:image/svg+xml;base64,' + btoa(ICON_SVG);

// Set apple-touch-icon
document.getElementById('pwa-icon').href = iconDataURL;

// 2. Create manifest blob and inject
const manifest = {
  name: 'Quest — Gamified Tasks',
  short_name: 'Quest',
  description: 'Application de tâches gamifiée avec niveaux et catégories',
  start_url: './',
  display: 'standalone',
  orientation: 'portrait',
  background_color: '#0f0f1a',
  theme_color: '#0f0f1a',
  icons: [
    { src: iconDataURL, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
    { src: iconDataURL, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
  ]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const manifestURL = URL.createObjectURL(manifestBlob);
document.getElementById('pwa-manifest').href = manifestURL;

// 3. Register Service Worker (inline via blob URL)
if ('serviceWorker' in navigator) {
  const SW_CODE = `
const CACHE = 'quest-v2';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(cached => cached || fetch(e.request).then(resp => {
      const clone = resp.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return resp;
    }).catch(() => cached))
  );
});
// Push notification support
self.addEventListener('push', e => {
  const data = e.data ? e.data.json() : {title:'Quest', body:'N\u2019oublie pas tes tâches !'};
  e.waitUntil(self.registration.showNotification(data.title, {
    body: data.body,
    icon: '/icon.png',
    badge: '/icon.png',
    vibrate: [200, 100, 200]
  }));
});
`;
  const swBlob = new Blob([SW_CODE], {type:'application/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL, {scope: './'})
    .then(reg => {
      console.log('[Quest] Service Worker enregistré', reg.scope);
      // Schedule daily notification via periodic check
      scheduleDailyNotif(reg);
    })
    .catch(err => console.warn('[Quest] SW non supporté:', err));
}

// 4. Daily notification scheduler (checks every minute if it's time)
function scheduleDailyNotif(reg) {
  function checkTime() {
    if (!notifTime) return;
    const now = new Date();
    const [h, m] = notifTime.split(':').map(Number);
    const target = new Date(now);
    target.setHours(h, m, 0, 0);
    const diff = Math.abs(now - target);
    // Fire if within 60s of the target time, and not already fired today
    const lastFired = localStorage.getItem('qst_last_notif');
    const todayKey = today() + '_' + notifTime;
    if (diff < 60000 && lastFired !== todayKey && Notification.permission === 'granted') {
      localStorage.setItem('qst_last_notif', todayKey);
      if (reg && reg.showNotification) {
        const due = tasks.filter(isTaskDueToday);
        const done = due.filter(t => !canComplete(t)).length;
        reg.showNotification('Quest ⬡', {
          body: `${done}/${due.length} tâches accomplies aujourd'hui. Continue !`,
          icon: iconDataURL,
          vibrate: [200, 100, 200],
          tag: 'quest-daily'
        });
      }
    }
  }
  setInterval(checkTime, 30000);
  checkTime();
}

// 5. Prompt "Add to Home Screen" on Android (beforeinstallprompt)
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install banner after 3s if not already installed
  setTimeout(() => {
    if (deferredPrompt && !window.matchMedia('(display-mode: standalone)').matches) {
      showInstallBanner();
    }
  }, 3000);
});

function showInstallBanner() {
  if (document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = `
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:linear-gradient(135deg,#7c6aff,#00d4ff);
    color:#fff;padding:12px 20px;border-radius:16px;
    font-size:13px;font-weight:600;font-family:-apple-system,sans-serif;
    box-shadow:0 8px 32px rgba(124,106,255,.5);
    display:flex;align-items:center;gap:12px;
    z-index:500;white-space:nowrap;cursor:pointer;
    animation:fadeUp .3s ease;
  `;
  banner.innerHTML = `<span style="font-size:20px">⬡</span> Installer Quest sur l'écran d'accueil
    <button onclick="installApp()" style="background:rgba(255,255,255,.25);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-weight:700;font-size:12px;cursor:pointer">Installer</button>
    <button onclick="document.getElementById('install-banner').remove()" style="background:transparent;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;padding:0 4px">✕</button>
  `;
  document.body.appendChild(banner);
}

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice => {
    if (choice.outcome === 'accepted') showToast('Quest installée ! ✓');
    deferredPrompt = null;
    const b = document.getElementById('install-banner');
    if (b) b.remove();
  });
}

// Hide banner if already running standalone
if (window.matchMedia('(display-mode: standalone)').matches) {
  window.addEventListener('load', () => {
    const b = document.getElementById('install-banner');
    if (b) b.remove();
  });
}
</script>
